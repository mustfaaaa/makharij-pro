org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Kotlin's incremental compiler crashes ("this and base files have different
# roots") on Windows when the project and the Gradle package cache are on
# different drive letters (e.g. project on E:, pub cache on C:) — hit by
# google_sign_in_android's compileDebugKotlin task. Disabling incremental
# compilation avoids the crash; it only costs a slightly slower clean build.
kotlin.incremental=false
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false

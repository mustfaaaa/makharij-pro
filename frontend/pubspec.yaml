name: frontend
description: "MakharijPro AI - Real-Time Tajweed Error Detection System for Quran Recitation. Flutter UI prototype."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  go_router: ^14.6.2
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.14
  lottie: ^3.1.3
  fl_chart: ^0.69.2
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/

flutter_launcher_icons:
  android: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#1F6E4E"
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"
